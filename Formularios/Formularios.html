<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad Formularios</title>
</head>
<body>

<h2>Registro de Jugador</h2>

<form>
    Nombre del jugador:
    <input type="text"><br><br>

    Categoría:
    <select>
        <option>Infantil</option>
        <option>Juvenil</option>
        <option>Mayor</option>
    </select><br><br>

    Posición de juego:
    <input type="radio" name="posicion"> Arquero
    <input type="radio" name="posicion"> Defensor
    <input type="radio" name="posicion"> Delantero
    <br><br>

    Deportes que practica:
    <input type="checkbox"> Fútbol
    <input type="checkbox"> Básquet
    <input type="checkbox"> Vóley
    <br><br>

    Comentarios del entrenador:<br>
    <textarea></textarea><br><br>

    <input type="submit" value="Enviar">
</form>

</body>
</html>
